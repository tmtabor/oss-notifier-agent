name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege — the job only reads the repo, so grant nothing else.
permissions:
  contents: read

# Cancel superseded runs when a PR branch is force-pushed or updated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Python version comes from .python-version
      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      # Unit tests only — evals are excluded by the `-m 'not eval'` default
      # in pyproject.toml, so no API key or secrets are needed here.
      - name: Run tests
        run: uv run pytest
