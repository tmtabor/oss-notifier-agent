name: Good First Issue Digest

on:
  schedule:
    # Daily at 14:09 UTC = ~7am Pacific Daylight Time (UTC-7). GitHub Actions
    # cron is UTC-only with no DST support, so during Pacific Standard Time
    # (UTC-8, roughly Nov-Mar) this actually runs at ~6am Pacific instead of
    # 7am — a one-hour drift twice a year, not something cron can fix.
    # Minute is :09, not :00 — GitHub's own docs call out the top of the
    # hour as a high-load period more prone to scheduling delay; we saw a
    # ~1h45m delay on the very first scheduled run with "0 14 * * *".
    - cron: "9 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: good-first-issue-digest
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run digest
        run: uv run python -m agent.pipeline.run
        env:
          # Only the secret matching AGENT_MODEL's provider needs a real
          # value; the others can be left unset in this fork's secrets.
          AGENT_MODEL: ${{ vars.AGENT_MODEL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AGENT_PIPELINE_CONFIG: ${{ secrets.AGENT_PIPELINE_CONFIG }}
          POSTMARK_SERVER_TOKEN: ${{ secrets.POSTMARK_SERVER_TOKEN }}
          AGENT_EMAIL_FROM: ${{ secrets.AGENT_EMAIL_FROM }}
          AGENT_EMAIL_TO: ${{ secrets.AGENT_EMAIL_TO }}
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
